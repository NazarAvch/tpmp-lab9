name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Select Xcode version
        run: sudo xcode-select -switch /Applications/Xcode_16.2.app
      
      - name: List available simulators (debug)
        run: xcrun simctl list devices
      
      - name: Resolve Swift Package Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project HotelBooking/HotelBooking.xcodeproj \
            -scheme HotelBooking
      
      - name: Run Unit and UI Tests
        run: |
          SIMULATOR_NAME=$(xcrun simctl list devices available | grep -m1 "iPhone" | grep -E -o 'iPhone [0-9, ]+' | xargs)
          SIMULATOR_OS=$(xcrun simctl list runtimes | grep "iOS" | grep -m1 -E -o '[\d\.]+')
          
          echo "Running tests on: platform=iOS Simulator,name=$SIMULATOR_NAME,OS=$SIMULATOR_OS"
          xcodebuild test \
            -project HotelBooking/HotelBooking.xcodeproj \
            -scheme HotelBooking \
            -destination "platform=iOS Simulator,name=$SIMULATOR_NAME,OS=$SIMULATOR_OS" \
            -testPlan HotelBookingTestPlan
